meta=lfric-coupled/vn3.1_t238

[command]
default=rose app-run -C $CYLC_WORKFLOW_RUN_DIR/app/coupled -O lam -O LAM50x50-2x2 --install-only
       =rose app-run -C $CYLC_WORKFLOW_RUN_DIR/app/coupled -O glo -O C12 --install-only
       =$LAUNCH_SCRIPT/cpl-launch-exe

[env]
EXEC_NAME=coupled
OMP_NUM_THREADS=1
TOTAL_RANKS=1
!!XIOS_SERVER_MODE=False
!!XIOS_SERVER_RANKS=1

[file:$DESTINATION_DIRECTORY]
mode=mkdir

[file:configuration_glo.nml]
mode=auto
source=namelist:base_mesh
      =  namelist:extrusion
      =  namelist:finite_element
      =  namelist:io
      =  namelist:logging
      =  namelist:planet
      =  namelist:partitioning
      =  namelist:time
      =  namelist:timestepping

[namelist:base_mesh]
f_lat_deg=45.0
file_prefix='mesh'
fplane=.false.
geometry='spherical'
prepartitioned=.false.
prime_mesh_name='dynamics'
topology='fully_periodic'

[namelist:extrusion]
domain_height=1000.0
!!eta_values=''
method='uniform'
number_of_layers=1
planet_radius=6371229.0

[namelist:finite_element]
cellshape='quadrilateral'
coord_order=1
coord_order_nonprime=1
coord_space='Wchi'
coord_system='native'
element_order_h=0
element_order_v=0
rehabilitate=.true.

[namelist:io]
checkpoint_read=.false.
!!checkpoint_times=
checkpoint_write=.false.
counter_output_suffix='counter.txt'
diagnostic_frequency=1
!!end_of_run_checkpoint=.true.
file_convention='UGRID'
nodal_output_on_w3=.false.
subroutine_counters=.false.
subroutine_timers=.false.
timer_output_path='timer.txt'
use_xios_io=.false.
write_diag=.false.

[namelist:logging]
log_to_rank_zero_only=.false.
run_log_level='info'

[namelist:multigrid]
chain_mesh_tags=''
multigrid_chain_nitems=1

[namelist:partitioning]
generate_inner_halos=.true.
panel_decomposition='auto'
!!panel_xproc=0
!!panel_yproc=0
partitioner='cubedsphere'

[namelist:planet]
scaling_factor=125.0

[namelist:time]
calendar='timestep'
calendar_origin='2016-01-01 15:00:00'
calendar_start='2016-01-01 15:00:00'
calendar_type='gregorian'
timestep_end='1'
timestep_start='1'

[namelist:timestepping]
dt=1.0
spinup_period=0.0
